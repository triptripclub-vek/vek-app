/* LOGIN USER */
function entrar(){
let u = val("u");
let p = val("p");

if(u==="demo123" && p==="1234"){
localStorage.setItem("vek_user",u);
inicio(u);
return;
}

let data = JSON.parse(localStorage.getItem("vek_users") || "[]");

let ok = data.find(x=>x.username===u && x.password===p);

if(ok){
localStorage.setItem("vek_user",u);
inicio(u);
}else{

}
}

/* GUARDAR NUEVO */
function guardar(ref){
let username = val("ru");
let nombre = val("rn");
let email = val("re");
let telefono = val("rt");
let pais = val("rp");
let password = val("rc");

if(!username || !password || !nombre){
alert("Completa los campos requeridos");
return;
}

let data = JSON.parse(localStorage.getItem("vek_users") || "[]");

if(data.find(x=>x.username===username)){
alert("Ese usuario ya existe");
return;
}

data.push({
username,nombre,email,telefono,pais,password,sponsor:ref
});

localStorage.setItem("vek_users",JSON.stringify(data));

alert("Cuenta creada correctamente");
login();
}

`;
}

/* COPIAR */
function copiar(u){
navigator.clipboard.writeText(
location.origin + location.pathname + "?ref=" + u
);
alert("Enlace copiado");
}

/* SALIR */
function salir(){
localStorage.removeItem("vek_user");
location.href = location.pathname;
}
