<!-- 3. REGISTRO REAL EN SUPABASE -->
<!-- REEMPLAZA TU SCRIPT registerUser() POR ESTE -->

<script>
const SUPABASE_URL = "https://fztcpxdlakbregupsush.supabase.co";
const SUPABASE_KEY = "TU_ANON_KEY_AQUI"; 

async function registerUser(){

let u = document.getElementById("ruser").value.trim().toLowerCase();
let p = document.getElementById("rpass").value.trim();
let n = document.getElementById("rname").value.trim();

if(!u || !p){
alert("Completa usuario y contraseña");
return;
}

/* verificar si existe */
let check = await fetch(SUPABASE_URL + "/rest/v1/users?username=eq."+u,{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
});

let exists = await check.json();

if(exists.length>0){
alert("Usuario ya existe");
return;
}

/* insertar real */
let save = await fetch(SUPABASE_URL + "/rest/v1/users",{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json",
Prefer:"return=representation"
},
body:JSON.stringify([{
username:u,
password:p,
nombre:n || u
}])
});

if(save.ok){
alert("Cuenta creada correctamente");
openDashboard(u);
}else{
alert("Error al guardar usuario");
}
}
</script>



<!-- 4. LOGIN REAL DESDE BASE DE DATOS -->
<script>
async function loginUser(){

let u = document.getElementById("user").value.trim().toLowerCase();
let p = document.getElementById("pass").value.trim();

let r = await fetch(
SUPABASE_URL+
"/rest/v1/users?username=eq."+u+"&password=eq."+p,{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
});

let data = await r.json();

if(data.length>0){
openDashboard(u);
}else{
alert("Datos incorrectos");
}
}
</script>
