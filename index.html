<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VEK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef1f5;
}
.box{
max-width:420px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}
input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#21409a;
color:#fff;
font-weight:bold;
cursor:pointer;
}
.card{
background:#fff;
padding:15px;
border-radius:14px;
margin:10px 0;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.small{
font-size:13px;
color:#777;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let user = localStorage.getItem("vek_user");
let role = localStorage.getItem("vek_role");

if(user && role==="user"){
dashboard();
}else if(user && role==="admin"){
admin();
}else{
login();
}

function login(){
document.getElementById("app").innerHTML = `
<div class="box">
<h2>🚀 VEK Login</h2>

<input id="u" placeholder="Usuario">
<input id="p" type="password" placeholder="Contraseña">

<button onclick="ingresar()">Ingresar</button>
<button onclick="adminLogin()">Admin</button>

<p class="small">
Usuario demo: demo123 / 1234
</p>
</div>
`;
}

function ingresar(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(u==="demo123" && p==="1234"){
localStorage.setItem("vek_user",u);
localStorage.setItem("vek_role","user");
dashboard();
}else{
alert("Datos incorrectos");
}
}

function adminLogin(){
let u=prompt("Usuario admin");
let p=prompt("Password");

if(u==="admin" && p==="admin123"){
localStorage.setItem("vek_user",u);
localStorage.setItem("vek_role","admin");
admin();
}else{
alert("Acceso denegado");
}
}

function dashboard(){
document.getElementById("app").innerHTML = `
<div class="box">
<h2>📊 Inicio Usuario</h2>

<div class="card">👤 Usuario: demo123</div>
<div class="card">📈 Sistema base activo</div>
<div class="card">🔐 Sesión iniciada</div>

<button onclick="logout()">Cerrar sesión</button>
</div>
`;
}

function admin(){
document.getElementById("app").innerHTML = `
<div class="box">
<h2>👑 Panel Admin</h2>

<div class="card">Usuarios activos: 1</div>
<div class="card">Sistema listo para Entrega 2</div>

<button onclick="logout()">Cerrar sesión</button>
</div>
`;
}

function logout(){
localStorage.clear();
login();
}
</script>

</body>
</html>
