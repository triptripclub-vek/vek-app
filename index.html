/* =========================
   LOGIN USER
========================= */
async function loginUser(){

let u=document.getElementById("user").value.trim().toLowerCase();
let p=document.getElementById("pass").value.trim();

if(!u || !p){
alert("Completa usuario y contraseña");
return;
}

/* demos locales */
if(users[u] && users[u].pass===p){
openDashboard(u);
return;
}

/* supabase */
const {data,error}=await supabase
.from("users")
.select("*")
.eq("username",u)
.eq("password",p)
.maybeSingle();

if(data){
openDashboard(data.username);
}else{
alert("Datos incorrectos");
}
}

/* =========================
   REGISTRO REAL
========================= */
async function registerUser(){

let u=ruser.value.trim().toLowerCase();
let n=rname.value.trim();
let e=remail.value.trim();
let t=rphone.value.trim();
let c=rcountry.value.trim();
let p=rpass.value.trim();

if(!u || !p){
alert("Completa usuario y contraseña");
return;
}

/* sponsor */
let sponsor = new URLSearchParams(location.search).get("ref") || "";

/* validar existente */
const {data:exist}=await supabase
.from("users")
.select("username")
.eq("username",u);

if(exist && exist.length>0){
alert("Usuario ya existe");
return;
}

/* insertar */
const {error}=await supabase
.from("users")
.insert([{
username:u,
password:p,
nombre:n || u,
email:e,
telefono:t,
pais:c,
sponsor:sponsor,
whatsapp:t,
status:"activo"
}]);

if(error){
alert("Error al registrar");
console.log(error);
return;
}

alert("Cuenta creada correctamente");
openDashboard(u);
}

/* =========================

========================= */
function openDashboard(name){

landingPage.classList.add("hidden");

dashName.innerText=name.toUpperCase();
myLink.innerText=location.origin+"/?ref="+name;
}

function logout(){
location.href=location.origin;
}

function copyLink(){
navigator.clipboard.writeText(myLink.innerText);
alert("Enlace copiado");
}

/* =========================
   CARGA INICIAL
========================= */
function loadPage(){

let ref=new URLSearchParams(location.search).get("ref");

if(ref){
landingPage.classList.remove("hidden");
loginPage.classList.add("hidden");
dashboard.classList.add("hidden");
}else{
loginPage.classList.remove("hidden");
landingPage.classList.add("hidden");
dashboard.classList.add("hidden");
}
}

/* =========================
   TIMER
========================= */
function runClock(){

setInterval(()=>{

let now=new Date();
let end=new Date();
end.setHours(23,59,59,999);

let diff=end-now;
if(diff<0)diff=0;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000)%24;
let m=Math.floor(diff/60000)%60;
let s=Math.floor(diff/1000)%60;

clock.innerText=
String(d).padStart(2,"0")+" : "+
String(h).padStart(2,"0")+" : "+
String(m).padStart(2,"0")+" : "+
String(s).padStart(2,"0");

},1000);
}
